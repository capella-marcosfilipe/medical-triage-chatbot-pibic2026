<app-fullscreen-stage>
  <h1 class="ask-page__title">Qual é o seu nome completo?</h1>
  <form class="ask-page__form" (submit)="onSubmit($event)">
    <app-form-field
      label="Nome completo"
      inputId="nome-completo"
      [control]="nomeControl"
      [errorMessage]="errorMessage"
    />
    <app-button-primary type="submit">Continuar</app-button-primary>
  </form>
</app-fullscreen-stage>
